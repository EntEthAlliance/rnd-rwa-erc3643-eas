[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = false
ffi = false

# Exclude library contracts with incompatible pragma versions
ignore = [
    "lib/T-REX/**",
    "lib/solidity/**",
]

remappings = [
    "forge-std/=lib/forge-std/src/",
    "@eas/=lib/eas-contracts/contracts/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
]

[profile.default.fuzz]
runs = 256

[profile.ci]
fuzz = { runs = 1000 }
