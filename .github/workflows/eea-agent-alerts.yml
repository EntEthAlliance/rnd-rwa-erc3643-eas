name: EEA Agent Alerts (issues/comments)

on:
  issues:
    types: [opened, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Build alert payload
        id: payload
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;
            const payload = context.payload;

            const repo = `${context.repo.owner}/${context.repo.repo}`;
            const issue = payload.issue;
            const issueNumber = issue.number;
            const issueTitle = issue.title;
            const issueUrl = issue.html_url;
            const issueAuthor = issue.user?.login || 'unknown';
            const issueBody = (issue.body || '').slice(0, 1200);

            const isComment = eventName === 'issue_comment';
            const action = payload.action;

            let actor = issueAuthor;
            let commentBody = '';
            let commentUrl = '';

            if (isComment) {
              actor = payload.comment?.user?.login || actor;
              commentBody = (payload.comment?.body || '').slice(0, 1200);
              commentUrl = payload.comment?.html_url || '';
            }

            const direction = isComment
              ? 'A new issue comment was posted. Review the context and approve/rewrite the suggested response before posting.'
              : 'A new issue was opened. Review the context and approve/rewrite the suggested first response before posting.';

            const suggestion = isComment
              ? `Thanks @${actor} — great point. We reviewed your comment and will follow up with a concrete update shortly.\n\nProposed next step: summarize current status + confirm timeline/owner for the change.`
              : `Thanks for opening this issue, @${actor}. We’ve reviewed it and will share a concrete triage update (scope, owner, next step) shortly.`;

            const header = `🚨 *EEA Agent Alert*\nRepo: *${repo}*\nEvent: *${eventName}* (${action})`;
            const issueLine = `Issue: #${issueNumber} — ${issueTitle}`;
            const fromLine = `From: @${actor}`;

            const bodySection = isComment
              ? `\n\n*Comment context*\n${commentBody || '(empty)'}`
              : `\n\n*Issue context*\n${issueBody || '(empty)'}`;

            const links = isComment
              ? `\n\nIssue: ${issueUrl}\nComment: ${commentUrl}`
              : `\n\nIssue: ${issueUrl}`;

            const tail = `\n\n*Suggested draft reply (requires your approval)*\n${suggestion}\n\nDirection: ${direction}`;

            const text = `${header}\n${issueLine}\n${fromLine}${bodySection}${links}${tail}`;

            core.setOutput('text', text);

      - name: Send Telegram alert to EEA agent channel
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.EEA_AGENT_TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.EEA_AGENT_TELEGRAM_CHAT_ID }}
          MESSAGE: ${{ steps.payload.outputs.text }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Missing EEA_AGENT_TELEGRAM_BOT_TOKEN or EEA_AGENT_TELEGRAM_CHAT_ID"
            exit 1
          fi

          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}" \
            -d "parse_mode=Markdown" \
            -d "disable_web_page_preview=true" >/dev/null

          echo "Alert sent"
