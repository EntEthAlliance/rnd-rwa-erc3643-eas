name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FOUNDRY_PROFILE: ci

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      contracts: ${{ steps.filter.outputs.contracts }}
      docs_site: ${{ steps.filter.outputs.docs_site }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Paths filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            contracts:
              - 'contracts/**'
              - 'src/**'
              - 'test/**'
              - 'script/**'
              - 'lib/**'
              - 'foundry.toml'
              - '.github/workflows/ci.yml'
            docs_site:
              - 'docs/**'
              - 'diagrams/**'
              - '**/*.md'
              - 'demo/**'

  docs-site:
    name: Docs / site-only checks
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.contracts != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: No contract changes detected
        run: |
          echo "Docs/site-only change — skipping Foundry build/test/coverage/gas." 

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.contracts == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Build contracts
        run: |
          forge build --sizes

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    if: ${{ needs.build.result == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      # The ERC-3643 submodule pins solc 0.8.17 + OZ 4.x and can't share a
      # forge compilation unit with Shibui (0.8.24 + OZ 5.x). The integration
      # test at test/integration/ERC3643Token.integration.t.sol deploys the
      # ERC-3643 contracts via `vm.deployCode` against pre-built Hardhat
      # artifacts, so we must run `hardhat compile` inside the submodule
      # before `forge test`.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Pre-compile ERC-3643 submodule (Hardhat artifacts for vm.deployCode)
        working-directory: lib/ERC-3643
        run: |
          npm ci --no-audit --no-fund
          npx hardhat compile

      - name: Run tests
        run: |
          forge test -vvv

  lint:
    name: Lint (forge fmt)
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.contracts == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Check formatting
        run: |
          forge fmt --check

  coverage:
    name: Coverage (push-only)
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'push' && needs.build.result == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      # Integration test needs Hardhat-built ERC-3643 artifacts (see `test` job).
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Pre-compile ERC-3643 submodule
        working-directory: lib/ERC-3643
        run: |
          npm ci --no-audit --no-fund
          npx hardhat compile

      - name: Run coverage
        # `forge coverage` disables via_ir + optimizer by default for accurate line
        # counts, which trips stack-too-deep in MockAttester / TopicPolicyBase
        # (10-field Schema v2 abi.encode). `--ir-minimum` re-enables via_ir with
        # minimal optimisation while still producing usable coverage output.
        run: |
          forge coverage --ir-minimum --report summary

  gas-report:
    name: Gas Report (PR-only)
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event_name == 'pull_request' && needs.test.result == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      # Integration test needs Hardhat-built ERC-3643 artifacts (see `test` job).
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Pre-compile ERC-3643 submodule
        working-directory: lib/ERC-3643
        run: |
          npm ci --no-audit --no-fund
          npx hardhat compile

      - name: Generate gas snapshot
        run: |
          forge snapshot

      - name: Upload gas snapshot
        uses: actions/upload-artifact@v4
        with:
          name: gas-snapshot
          path: .gas-snapshot
