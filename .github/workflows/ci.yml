name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FOUNDRY_PROFILE: ci

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      contracts: ${{ steps.filter.outputs.contracts }}
      docs_site: ${{ steps.filter.outputs.docs_site }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Paths filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            contracts:
              - 'contracts/**'
              - 'src/**'
              - 'test/**'
              - 'script/**'
              - 'lib/**'
              - 'foundry.toml'
              - '.github/workflows/ci.yml'
            docs_site:
              - 'docs/**'
              - 'diagrams/**'
              - '**/*.md'
              - 'demo/**'

  docs-site:
    name: Docs / site-only checks
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.contracts != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: No contract changes detected
        run: |
          echo "Docs/site-only change — skipping Foundry build/test/coverage/gas." 

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.contracts == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Build contracts
        run: |
          forge build --sizes

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    if: ${{ needs.build.result == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Run tests
        run: |
          forge test -vvv

  lint:
    name: Lint (forge fmt)
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.contracts == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Check formatting
        run: |
          forge fmt --check

  coverage:
    name: Coverage (push-only)
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'push' && needs.build.result == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Run coverage
        run: |
          forge coverage --report summary

  gas-report:
    name: Gas Report (PR-only)
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event_name == 'pull_request' && needs.test.result == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Generate gas snapshot
        run: |
          forge snapshot

      - name: Upload gas snapshot
        uses: actions/upload-artifact@v4
        with:
          name: gas-snapshot
          path: .gas-snapshot
