name: Demo build

on:
  push:
    branches: [main, master]
    paths:
      - "demo/shibui-app/**"
      - "deployments/sepolia.json"
      - ".github/workflows/demo-build.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "demo/shibui-app/**"
      - "deployments/sepolia.json"
      - ".github/workflows/demo-build.yml"

jobs:
  build:
    name: Typecheck + build Next.js demo
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demo/shibui-app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: demo/shibui-app/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Sync deployments.json
        run: npm run sync:deployments

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          # CI uses a placeholder projectId; real deploys inject their own via
          # repository secrets. The build must still succeed without it.
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ci-placeholder
          NEXT_PUBLIC_SEPOLIA_RPC_URL: https://rpc.sepolia.org
        run: npm run build
